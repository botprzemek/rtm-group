name: Automatically assign user for review
on:
    pull_request:
        types: [opened, ready_for_review]

jobs:
    assign_users:
        runs-on: ubuntu-latest
        steps:
            - name: Assign users
              uses: kentaro-m/auto-assign-action@v2.0.1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
